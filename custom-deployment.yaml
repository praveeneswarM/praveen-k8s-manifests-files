apiVersion: apps/v1
kind: Deployment
metadata:
  name: cust-deploy
  namespace: praveen-ns
  labels:
    app: cust-dep
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: fitness
  replicas: 8
  template:
    metadata:
      labels:
        app: fitness
    spec:
      containers:
        - name: fitness-container
          image: muralisocial123/transaction-app:v1.0.0
          ports:
            - containerPort: 3000

  